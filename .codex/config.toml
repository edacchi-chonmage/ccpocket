[mcp_servers.marionette]
command = "marionette_mcp"
args = []
enabled_tools = [
  "connect",
  "disconnect",
  "get_interactive_elements",
  "get_logs",
  "scroll_to",
  "tap",
  "enter_text",
  "take_screenshots",
  "list_custom_extensions",
  "call_custom_extension",
]

[mcp_servers.dart-mcp]
command = "dart"
args = ["mcp-server"]
env = {}
enabled_tools = [
  "launch_app",
  "stop_app",
  "get_app_logs",
  "list_running_apps",
  "connect_dart_tooling_daemon",
  "hot_reload",
  "hot_restart",
  "get_widget_tree",
  "get_runtime_errors",
]
