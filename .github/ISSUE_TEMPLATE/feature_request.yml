name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature!

        If this request is mainly about an experimental / best-effort platform
        such as Bridge Server on Windows or the Flutter mobile app on macOS,
        please explain why existing supported setups are insufficient and how you expect to validate the change.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of CC Pocket does this relate to?
      options:
        - Mobile App
        - Bridge Server
        - Both
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
      placeholder: I find it difficult to ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've thought about?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, screenshots, mockups, or target platform details.
    validations:
      required: false
