name: Bridge Release

on:
  push:
    tags:
      - 'bridge/v*'

permissions:
  contents: write
  id-token: write

jobs:
  verify-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:bridge

      - name: Type check
        run: npx tsc --noEmit -p packages/bridge/tsconfig.json

      - name: Build
        run: npm run bridge:build

  verify-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Windows smoke tests
        run: npm run test:windows-smoke --workspace=packages/bridge

      - name: Type check
        run: npx tsc --noEmit -p packages/bridge/tsconfig.json

      - name: Build
        run: npm run bridge:build

  release:
    needs:
      - verify-linux
      - verify-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Update npm for OIDC support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        run: npm publish --workspace=packages/bridge --provenance --access public

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#bridge/v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md
          awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" packages/bridge/CHANGELOG.md > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "@ccpocket/bridge ${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release-notes.md
