name: macOS Release
on:
  push:
    tags:
      - 'macos/v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    env:
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Read Flutter version from .mise.toml
        id: mise
        run: echo "flutter_version=$(grep 'flutter' .mise.toml | sed 's/.*= *\"//' | sed 's/\"//')" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ steps.mise.outputs.flutter_version }}
          cache: true

      - run: flutter pub get
        working-directory: apps/mobile

      - run: dart analyze .
        working-directory: apps/mobile

      - run: flutter test
        working-directory: apps/mobile

      # --- Code Signing (p12 direct import) ---
      - name: Import Developer ID certificate
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KC_PASS="$(openssl rand -base64 32)"

          security create-keychain -p "$KC_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KC_PASS" "$KEYCHAIN_PATH"

          # Decode and import the p12 certificate
          P12_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > "$P12_PATH"

          security import "$P12_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KC_PASS" "$KEYCHAIN_PATH"

          # Add to search list (prepend so it takes priority)
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Verify certificate is available
          security find-identity -v -p codesigning
          echo "keychain_path=$KEYCHAIN_PATH" >> "$GITHUB_OUTPUT"

      # --- Build ---
      - name: Build macOS app
        working-directory: apps/mobile
        run: flutter build macos --release

      # --- Sign the app bundle ---
      - name: Find and sign app
        id: sign
        run: |
          APP_PATH="apps/mobile/build/macos/Build/Products/Release/CC Pocket.app"
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"

          # Find Developer ID Application identity
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')

          if [ -z "$IDENTITY" ]; then
            echo "::warning::Developer ID Application certificate not found, using available identity"
            IDENTITY=$(security find-identity -v -p codesigning | head -1 | awk -F'"' '{print $2}')
          fi

          echo "Signing with: $IDENTITY"

          # Deep sign the app bundle
          codesign --deep --force --options runtime \
            --sign "$IDENTITY" \
            --entitlements apps/mobile/macos/Runner/Release.entitlements \
            "$APP_PATH"

          # Verify
          codesign --verify --deep --strict "$APP_PATH"
          echo "✅ Code signing verified"

      # --- Create DMG ---
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        id: dmg
        run: |
          APP_PATH="${{ steps.sign.outputs.app_path }}"
          DMG_NAME="CC-Pocket-macos.dmg"

          # Create DMG with Applications symlink and styled window
          create-dmg \
            --volname "CC Pocket" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "CC Pocket.app" 150 185 \
            --app-drop-link 450 185 \
            --no-internet-enable \
            "$DMG_NAME" \
            "$APP_PATH"

          echo "dmg_path=$DMG_NAME" >> "$GITHUB_OUTPUT"

          # Sign the DMG too
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          if [ -n "$IDENTITY" ]; then
            codesign --force --sign "$IDENTITY" "$DMG_NAME"
          fi

      # --- Notarize ---
      - name: Setup App Store Connect API key for notarization
        run: |
          mkdir -p ~/.private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8

      - name: Notarize DMG
        run: |
          xcrun notarytool submit "${{ steps.dmg.outputs.dmg_path }}" \
            --key ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8 \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --wait --timeout 30m

          # Staple the notarization ticket
          xcrun stapler staple "${{ steps.dmg.outputs.dmg_path }}"
          echo "✅ Notarization complete"

      # --- GitHub Release ---
      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/')
        id: version
        run: echo "version=${GITHUB_REF_NAME#macos/v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        if: startsWith(github.ref, 'refs/tags/')
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SEMVER="${VERSION%%+*}"
          NOTES=$(awk "/^## \\[${SEMVER}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Rename DMG with version
        if: startsWith(github.ref, 'refs/tags/')
        id: rename
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SEMVER="${VERSION%%+*}"
          VERSIONED_DMG="CC-Pocket-macos-v${SEMVER}.dmg"
          mv "${{ steps.dmg.outputs.dmg_path }}" "$VERSIONED_DMG"
          echo "dmg_path=$VERSIONED_DMG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES: ${{ steps.changelog.outputs.notes }}
        run: |
          printf '%s\n' "$RELEASE_NOTES" > /tmp/release_notes.md
          gh release create "$GITHUB_REF_NAME" \
            "${{ steps.rename.outputs.dmg_path }}" \
            --title "macOS ${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release_notes.md
