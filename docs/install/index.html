<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Install CC Pocket</title>
  <meta name="description" content="CC Pocket – Control Codex & Claude Code from your phone">
  <meta property="og:title" content="CC Pocket">
  <meta property="og:description" content="Your mac's coding AI, in your pocket.">
  <meta property="og:image" content="https://k9i-0.github.io/ccpocket/install/og-image.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 480px;
    }
    .icon {
      width: 80px;
      height: 80px;
      border-radius: 18px;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      color: #fff;
    }
    .tagline {
      font-size: 1rem;
      color: #999;
      margin-bottom: 2rem;
    }
    .stores {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .stores a img {
      height: 44px;
    }
    .divider {
      margin: 2rem 0;
      border-top: 1px solid #333;
    }
    .footer {
      font-size: 0.85rem;
      color: #666;
    }
    .footer a {
      color: #999;
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }
    .redirecting {
      font-size: 0.9rem;
      color: #999;
      margin-bottom: 1.5rem;
    }
  </style>
  <script>
    (function() {
      var ua = navigator.userAgent || '';
      if (/iPhone|iPad|iPod/.test(ua)) {
        window.location.href = 'https://apps.apple.com/us/app/cc-pocket-code-anywhere/id6759188790';
      } else if (/Android/.test(ua)) {
        window.location.href = 'https://play.google.com/store/apps/details?id=com.k9i.ccpocket';
      }
      // Desktop visitors see the fallback page below
    })();
  </script>
</head>
<body>
  <div class="container">
    <img class="icon" src="https://raw.githubusercontent.com/K9i-0/ccpocket/main/apps/mobile/fastlane/metadata/android/en-US/images/icon.png" alt="CC Pocket icon">
    <h1>CC Pocket</h1>
    <p class="tagline">Your mac's coding AI, in your pocket.</p>
    <div class="stores">
      <a href="https://apps.apple.com/us/app/cc-pocket-code-anywhere/id6759188790">
        <img alt="Download on the App Store" src="https://raw.githubusercontent.com/K9i-0/ccpocket/main/docs/images/app-store-badge.svg">
      </a>
      <a href="https://play.google.com/store/apps/details?id=com.k9i.ccpocket">
        <img alt="Get it on Google Play" src="https://raw.githubusercontent.com/K9i-0/ccpocket/main/docs/images/google-play-badge-en.svg">
      </a>
    </div>
    <div class="divider"></div>
    <p class="footer">
      <a href="https://github.com/K9i-0/ccpocket">GitHub</a>
    </p>
  </div>
</body>
</html>
